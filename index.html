<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <button class="AC clear-btn">AC</button>
      <button class="= equal-btn">=</button>
      <button class="1 number-btn">1</button>
      <button class="2 number-btn">2</button>
      <button class="3 number-btn">3</button>
      <button class="4 number-btn">4</button>
      <button class="5 number-btn">5</button>
      <button class="6 number-btn">6</button>
      <button class="7 number-btn">7</button>
      <button class="8 number-btn">8</button>
      <button class="9 number-btn">9</button>
      <button class="0 number-btn">0</button>
      <button class="+ operator-btn">+</button>
      <button class="- operator-btn">-</button>
      <button class="* operator-btn">*</button>
      <button class="/ operator-btn">/</button>
    </div>
    <div class="result"></div>
    <script src="script.js"></script>
  </body>
</html>
